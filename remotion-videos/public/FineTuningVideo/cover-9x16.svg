<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1c2333"/>
    </linearGradient>
    
    <!-- 标题渐变 -->
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#79c0ff"/>
    </linearGradient>
    
    <!-- 装饰线渐变 -->
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#f0883e"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    
    <!-- 底部渐变条 -->
    <linearGradient id="bottomGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0883e"/>
      <stop offset="50%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    
    <!-- 光球滤镜 -->
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="100"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="80"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1080" height="1920" fill="url(#bgGradient)"/>
  
  <!-- 装饰圆环 -->
  <circle cx="100" cy="300" r="100" fill="none" stroke="rgba(88,166,255,0.1)" stroke-width="2"/>
  <circle cx="1000" cy="1520" r="75" fill="none" stroke="rgba(240,136,62,0.1)" stroke-width="2"/>
  
  <!-- 光球装饰 - 中上 -->
  <circle cx="540" y="350" r="350" fill="rgba(88,166,255,0.3)" filter="url(#blur1)"/>
  
  <!-- 光球装饰 - 左下 -->
  <circle cx="180" cy="1620" r="300" fill="rgba(240,136,62,0.25)" filter="url(#blur2)"/>
  
  <!-- 光球装饰 - 右中 -->
  <circle cx="930" cy="960" r="250" fill="rgba(63,185,80,0.18)" filter="url(#blur2)"/>
  
  <!-- 系列徽章 -->
  <g transform="translate(540, 320)">
    <rect x="-125" y="-28" width="250" height="56" rx="28" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <circle cx="-95" cy="0" r="6" fill="#3fb950"/>
    <text x="0" y="10" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-weight="500" fill="#8b949e">5分钟 AI · 第19期</text>
  </g>
  
  <!-- 主标题 Fine-tuning -->
  <text x="540" y="550" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="100" font-weight="900" fill="url(#titleGradient)" letter-spacing="-1">Fine-tuning</text>
  
  <!-- 副标题 -->
  <text x="540" y="660" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="64" font-weight="600" fill="#c9d1d9" letter-spacing="6">模型微调</text>
  
  <!-- 标语 -->
  <text x="540" y="820" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="40" font-weight="600" fill="#f0883e">让通用AI成为你的</text>
  <text x="540" y="880" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="40" font-weight="600" fill="#f0883e">领域专家</text>
  
  <!-- 装饰线 -->
  <rect x="440" y="960" width="200" height="4" rx="2" fill="url(#lineGradient)"/>
  
  <!-- 关键词标签 - 垂直排列 -->
  <g transform="translate(540, 1080)">
    <!-- 预训练 → 微调 -->
    <rect x="-140" y="0" width="280" height="60" rx="30" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="0" y="38" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="600" fill="#f0883e">预训练 → 微调</text>
    
    <!-- PEFT 参数高效微调 -->
    <rect x="-165" y="90" width="330" height="60" rx="30" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="0" y="128" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="600" fill="#3fb950">PEFT 参数高效微调</text>
    
    <!-- LoRA 低秩适应 -->
    <rect x="-150" y="180" width="300" height="60" rx="30" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="0" y="218" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="600" fill="#ffd200">LoRA 低秩适应</text>
  </g>
  
  <!-- 底部渐变条 -->
  <rect x="0" y="1912" width="1080" height="8" fill="url(#bottomGradient)"/>
  
  <!-- 账号信息 -->
  <text x="540" y="1880" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="500" fill="rgba(255,255,255,0.4)">@5分钟AI</text>
</svg>